<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title description">
  <title id="title">HOODL — Permissionless index tokens</title>
  <description id="description">A HOODL social preview with tokenized stock and crypto assets combined into one on-chain index.</description>
  <defs>
    <linearGradient id="background" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#181a12"/>
      <stop offset="0.55" stop-color="#0f100c"/>
      <stop offset="1" stop-color="#080906"/>
    </linearGradient>
    <radialGradient id="glow" cx="0" cy="0" r="1" gradientTransform="translate(990 315) rotate(90) scale(360)">
      <stop offset="0" stop-color="#ccff00" stop-opacity="0.25"/>
      <stop offset="1" stop-color="#ccff00" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M 48 0 L 0 0 0 48" fill="none" stroke="#f1f4e8" stroke-opacity="0.06" stroke-width="1"/>
    </pattern>
    <filter id="shadow" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="18" stdDeviation="20" flood-color="#000000" flood-opacity="0.5"/>
    </filter>
    <filter id="softGlow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="16"/>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#background)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>
  <path d="M0 556 C280 500 450 640 740 560 C940 505 1070 525 1200 488 V630 H0Z" fill="#ccff00" fill-opacity="0.035"/>

  <g transform="translate(72 66)">
    <rect width="56" height="56" rx="13" fill="#ccff00"/>
    <g fill="#1e1a0f" transform="scale(1.75)">
      <rect x="7" y="7" width="5" height="18" rx="2"/>
      <rect x="20" y="7" width="5" height="18" rx="2"/>
      <rect x="7" y="13.5" width="18" height="5" rx="2"/>
    </g>
    <text x="76" y="38" fill="#f4f5ef" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="700" letter-spacing="-0.5">HOODL</text>
    <text x="179" y="38" fill="#8c9182" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="500">.finance</text>
  </g>

  <g transform="translate(72 190)">
    <text fill="#f4f5ef" font-family="Arial, Helvetica, sans-serif" font-size="72" font-weight="700" letter-spacing="-3">
      <tspan x="0" y="0">Permissionless</tspan>
      <tspan x="0" y="82">index tokens.</tspan>
    </text>
    <text x="2" y="142" fill="#a9ad9f" font-family="Arial, Helvetica, sans-serif" font-size="25" font-weight="400">
      Tokenized stocks + crypto. One fully backed ERC-20.
    </text>
  </g>

  <g transform="translate(72 492)">
    <rect width="276" height="46" rx="23" fill="#ccff00" fill-opacity="0.12" stroke="#ccff00" stroke-opacity="0.45"/>
    <circle cx="24" cy="23" r="5" fill="#ccff00"/>
    <text x="40" y="29" fill="#dfff5f" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="700" letter-spacing="1.4">LIVE ON ROBINHOOD CHAIN</text>
  </g>

  <g transform="translate(745 96)">
    <circle cx="225" cy="220" r="214" fill="#ccff00" fill-opacity="0.05" stroke="#ccff00" stroke-opacity="0.12"/>
    <circle cx="225" cy="220" r="158" fill="none" stroke="#ccff00" stroke-opacity="0.15" stroke-width="1.5" stroke-dasharray="5 10"/>
    <circle cx="225" cy="220" r="92" fill="#ccff00" fill-opacity="0.16" filter="url(#softGlow)"/>

    <path d="M74 119 L179 186" stroke="#ccff00" stroke-opacity="0.5" stroke-width="2"/>
    <path d="M57 302 L177 247" stroke="#ccff00" stroke-opacity="0.5" stroke-width="2"/>
    <path d="M337 366 L269 286" stroke="#ccff00" stroke-opacity="0.5" stroke-width="2"/>

    <g transform="translate(2 68)" filter="url(#shadow)">
      <rect width="116" height="86" rx="18" fill="#20231b" stroke="#7e8274" stroke-opacity="0.6"/>
      <text x="18" y="32" fill="#8c9182" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="700" letter-spacing="1.5">EQUITY</text>
      <text x="18" y="62" fill="#f4f5ef" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700">NVDA</text>
    </g>
    <g transform="translate(0 268)" filter="url(#shadow)">
      <rect width="116" height="86" rx="18" fill="#20231b" stroke="#7e8274" stroke-opacity="0.6"/>
      <text x="18" y="32" fill="#8c9182" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="700" letter-spacing="1.5">EQUITY</text>
      <text x="18" y="62" fill="#f4f5ef" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700">TSLA</text>
    </g>
    <g transform="translate(327 333)" filter="url(#shadow)">
      <rect width="126" height="86" rx="18" fill="#20231b" stroke="#7e8274" stroke-opacity="0.6"/>
      <text x="18" y="32" fill="#8c9182" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="700" letter-spacing="1.5">CRYPTO</text>
      <text x="18" y="62" fill="#f4f5ef" font-family="Arial, Helvetica, sans-serif" font-size="21" font-weight="700">CASHCAT</text>
    </g>

    <g transform="translate(145 140)" filter="url(#shadow)">
      <rect width="162" height="162" rx="38" fill="#ccff00"/>
      <text x="81" y="77" text-anchor="middle" fill="#1e1a0f" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700" letter-spacing="2">INDEX</text>
      <text x="81" y="119" text-anchor="middle" fill="#1e1a0f" font-family="Arial, Helvetica, sans-serif" font-size="45" font-weight="800">hAI</text>
    </g>
  </g>

  <rect x="20" y="20" width="1160" height="590" rx="26" fill="none" stroke="#f4f5ef" stroke-opacity="0.08"/>
</svg>
