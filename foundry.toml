[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc = "0.8.26"
evm_version = "cancun"            # Robinhood Chain = Arbitrum Nitro (ArbOS 20+); v4 REQUIRES transient storage
optimizer = true
optimizer_runs = 200
auto_detect_remappings = false    # remappings.txt is the single source of truth

[profile.default.fuzz]
runs = 256

# Robinhood Chain — mainnet 4663, testnet 46630
[rpc_endpoints]
rh_mainnet = "https://rpc.mainnet.chain.robinhood.com"
rh_testnet = "https://rpc.testnet.chain.robinhood.com"

# Blockscout verification (NOT Etherscan)
[etherscan]
rh_mainnet = { key = "blockscout", url = "https://robinhoodchain.blockscout.com/api/", chain = 4663 }
rh_testnet = { key = "blockscout", url = "https://explorer.testnet.chain.robinhood.com/api/", chain = 46630 }
